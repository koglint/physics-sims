<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physics Simulations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">
  <main class="site-shell">
    <section class="hero">
      <p class="eyebrow">Static Canvas Simulations</p>
      <h1>Physics Simulations</h1>
      <p class="hero-copy">

        <p>Choose a mechanics simulation to explore.</p>

      <div id="simulation-grid" class="simulation-grid" aria-live="polite"></div>
    </section>
  </main>

  <script type="module" src="main.js"></script>
